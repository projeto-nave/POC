<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nave do Conhecimento | Site Fictício</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  </head>

  <body>
    <header class="cabecalho-fixo">
      <div class="texto-alerta">
        <strong>Atenção:</strong> Espaço para demonstração. Este cabeçalho não será implementado na versão final, pois este espaço já existe no site oficial das Naves do Conhecimento.
      </div>
      <div class="botoes-cabecalho">
        <a href="Equipe/equipe.html" style="color: #51d5e1;" target="_blank">Desenvolvedores</a>
        <button class="btn-cabecalho btn-usuario" id="openLogin">Área do usuário</button>
        <button class="btn-cabecalho btn-logout" id="logoutBtn" style="display:none;">Sair</button>
        <button class="btn-cabecalho btn-cadastro" id="openCadastroHeader">Cadastre-se</button>
      </div>
    </header>

    <div class="fundo-pagina">
      <a href="#" class="botao-agente" id="gatilhoAgente">
          <img src="images/Agente Nicole _ Conversar.png" alt="Conversar com a Agente Nicole" class="imagem-agente">
      </a>
    </div>

    <div id="fundoChat" class="fundo-modal">
      <div id="janelaChat" class="janela-flutuante">
        <div class="cabecalho-janela">
          <img src="images/Agente Nicole.png" alt="Agente Nicole" class="mini-agente">
          <span class="titulo-janela">Nicole: a astronauta das Naves</span>
          <button class="botao-fechar" id="fecharChatBtn" title="Fechar janela"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="conteudo-janela" id="chatMessages">
          <div class="mensagem-sistema">
            </div>
        </div>
        <div class="rodape-janela">
          <input type="text" id="chatInput" placeholder="Escreva sua mensagem aqui..." class="input-texto">
          <button class="botao-acao" id="voice" title="Enviar mensagem por voz"><i class="fa-solid fa-microphone"></i></button>
          <button class="botao-acao" id="sendChat" title="Enviar texto"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
      </div>
    </div>

    <div id="loginModal" class="fundo-modal">
      <div class="conteudo-modal">
        <button class="fechar-modal" id="closeLogin" title="Fechar janela"><i class="fa-solid fa-xmark"></i></button>
        <h2 class="titulo-modal">Área do Usuário</h2>
        <form id="formLogin" class="formulario-modal">
          <div class="grupo-input">
            <label class="rotulo-input" for="email">E-mail</label>
            <input type="email" id="email" class="input-modal" placeholder="seu@email.com" required autocomplete="username">
          </div>
          <div class="grupo-input">
            <label class="rotulo-input" for="password">Senha</label>
            <input type="password" id="password" class="input-modal" placeholder="Sua senha" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn-acao-modal">Entrar</button>
          </form>
        <p class="link-troca-modal">
          Não tem conta? <a id="openCadastro">Cadastre-se</a>
        </p>
      </div>
    </div>

    <div id="cadastroModal" class="fundo-modal">
      <div class="conteudo-modal">
        <button class="fechar-modal" id="closeCadastro" title="Fechar janela"><i class="fa-solid fa-xmark"></i></button>
        <h2 class="titulo-modal">Criar Conta</h2>
        <form id="formCadastro" class="formulario-modal">
          <div class="grupo-input">
            <label class="rotulo-input" for="cadNome">Nome</label>
            <input type="text" id="cadNome" class="input-modal" placeholder="Seu nome completo" required autocomplete="name">
          </div>
          <div class="grupo-input">
            <label class="rotulo-input" for="cadEmail">E-mail</label>
            <input type="email" id="cadEmail" class="input-modal" placeholder="seu@email.com" required autocomplete="email">
          </div>
          <div class="grupo-input">
            <label class="rotulo-input" for="cadSenha">Senha</label>
            <input type="password" id="cadSenha" class="input-modal" placeholder="Mínimo 6 caracteres" required minlength="6" autocomplete="new-password">
          </div>
          <div class="grupo-input">
            <label class="rotulo-input" for="cadNascimento">Data de nascimento</label>
            <input type="date" id="cadNascimento" class="input-modal" required>
          </div>
          <button type="submit" class="btn-acao-modal">Cadastrar</button>
          </form>
        <p class="link-troca-modal">
          Já tem conta? <a id="voltarLogin">Entrar</a>
        </p>
      </div>
    </div>
    
    <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>
    <script src="js/script.js"></script>
  </body>
</html>
